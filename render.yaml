services:
  - type: web
    name: breach-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class gevent --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: BREACH2_SHEET_ID
        value: 1tYkZxNSFbAgTa7lfEsdcFEmbp8w6qcQ9KSV7wBo1eOc
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false  # Set manually in Render dashboard as a secret
